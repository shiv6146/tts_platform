# Lightning / NVIDIA GPU: vLLM in-process (no llama.cpp sidecar).
# Do not combine with docker-compose.llamacpp-gpu.yml. Use scripts/use-backend.sh to switch.
services:
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile.gpu
    environment:
      INFERENCE_BACKEND: vllm
      INFERENCE_MOCK: "false"
      REQUIRE_REAL_INFERENCE: "true"
      VLLM_DEVICE: cuda
      INFERENCE_GPU_PROFILE: ${INFERENCE_GPU_PROFILE:-l4}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-}
      SNAC_DEVICE: cuda
      ORPHEUS_MODEL_NAME: canopylabs/orpheus-3b-0.1-ft
      ORPHEUS_TOKENIZER: canopylabs/orpheus-3b-0.1-pretrained
      ORPHEUS_MAX_TOKENS: ${ORPHEUS_MAX_TOKENS:-4096}
      ORPHEUS_TEMPERATURE: ${ORPHEUS_TEMPERATURE:-0.6}
      ORPHEUS_TOP_P: ${ORPHEUS_TOP_P:-0.9}
      ORPHEUS_BATCH_CHARS: ${ORPHEUS_BATCH_CHARS:-}
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    ports:
      - "50051:50051"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import grpc; from tts.v1 import inference_pb2,inference_pb2_grpc; ch=grpc.insecure_channel('localhost:50051'); stub=inference_pb2_grpc.TTSInferenceStub(ch); r=stub.Health(inference_pb2.HealthRequest(), timeout=30); exit(0 if r.ok else 1)",
        ]
      interval: 30s
      timeout: 35s
      retries: 20
      start_period: 600s
