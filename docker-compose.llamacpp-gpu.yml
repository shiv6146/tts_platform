# Lightning / NVIDIA GPU: lex-au GGUF via llama.cpp (CUDA) + SNAC inference gRPC.
#
# Default layout (recommended on L40S):
#   - 1× tuned llama-server (Q4, flash-attn, cont-batching, --parallel 48)
#   - 3× inference gRPC replicas (SNAC decode parallelism; API round-robins)
#
# Usage:
#   ./scripts/compose-up.sh llamacpp
#   LLAMACPP_REPLICAS=2 ./scripts/compose-up.sh llamacpp   # optional multi-llama + nginx LB
services:
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile.llamacpp-gpu
    environment:
      INFERENCE_BACKEND: llamacpp
      INFERENCE_MOCK: "false"
      REQUIRE_REAL_INFERENCE: "true"
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      LLAMACPP_URL: ${LLAMACPP_URL:-http://llama-cpp-server:5006/v1/completions}
      SNAC_DEVICE: cuda
      ORPHEUS_GGUF_MODEL: ${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q4_K_M.gguf}
      ORPHEUS_GGUF_HF_REPO: ${ORPHEUS_GGUF_HF_REPO:-lex-au/Orpheus-3b-FT-Q4_K_M.gguf}
      ORPHEUS_MAX_TOKENS: ${ORPHEUS_MAX_TOKENS:-8192}
      ORPHEUS_TEMPERATURE: ${ORPHEUS_TEMPERATURE:-0.6}
      ORPHEUS_TOP_P: ${ORPHEUS_TOP_P:-0.9}
      GRPC_MAX_WORKERS: ${GRPC_MAX_WORKERS:-48}
      LLAMACPP_CTX_SIZE: ${LLAMACPP_CTX_SIZE:-8192}
      ORPHEUS_BATCH_CHARS: ${ORPHEUS_BATCH_CHARS:-}
    volumes: []
    depends_on:
      llama-cpp-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      start_period: 600s

  # Optional: enable with --profile llama-multiplex when LLAMACPP_REPLICAS>1
  llama-lb:
    profiles: ["llama-multiplex"]
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/llama-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      llama-cpp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:5006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  llama-cpp-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    volumes:
      - gguf_models:/models
    depends_on:
      model-init:
        condition: service_completed_successfully
    command:
      - -m
      - /models/${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q4_K_M.gguf}
      - --host
      - "0.0.0.0"
      - --port
      - "5006"
      - -ngl
      - "99"
      - --ctx-size
      - "${LLAMACPP_CTX_SIZE:-8192}"
      - --parallel
      - "${LLAMACPP_PARALLEL:-48}"
      - --flash-attn
      - "${LLAMACPP_FLASH_ATTN:-on}"
      - --cont-batching
      - --batch-size
      - "${LLAMACPP_BATCH_SIZE:-512}"
      - --ubatch-size
      - "${LLAMACPP_UBATCH_SIZE:-256}"
      - --cache-type-k
      - "${LLAMACPP_CACHE_TYPE_K:-q4_0}"
      - --cache-type-v
      - "${LLAMACPP_CACHE_TYPE_V:-q4_0}"
      - --prio
      - "${LLAMACPP_PRIO:-2}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  model-init:
    image: python:3.11-slim
    volumes:
      - gguf_models:/models
    environment:
      ORPHEUS_GGUF_MODEL: ${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q4_K_M.gguf}
      ORPHEUS_GGUF_HF_REPO: ${ORPHEUS_GGUF_HF_REPO:-lex-au/Orpheus-3b-FT-Q4_K_M.gguf}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        pip install -q --no-cache-dir huggingface_hub
        python <<'PY'
        import os
        import shutil
        from huggingface_hub import hf_hub_download
        model = os.environ["ORPHEUS_GGUF_MODEL"]
        repo = os.environ["ORPHEUS_GGUF_HF_REPO"]
        dest = f"/models/{model}"
        token = os.environ.get("HF_TOKEN") or os.environ.get("HUGGING_FACE_HUB_TOKEN")
        if os.path.isfile(dest) and os.path.getsize(dest) > 1_000_000:
            print("GGUF already present:", dest, os.path.getsize(dest))
        else:
            path = hf_hub_download(
                repo_id=repo,
                filename=model,
                token=token,
            )
            if os.path.abspath(path) != os.path.abspath(dest):
                shutil.copy2(path, dest)
            print("Downloaded:", dest, os.path.getsize(dest))
        PY

volumes:
  gguf_models:
