# Lightning / NVIDIA GPU: lex-au GGUF via llama.cpp (CUDA) + SNAC inference gRPC.
# Usage:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.llamacpp-gpu.yml docker compose up --build -d
services:
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile.llamacpp-gpu
    environment:
      INFERENCE_BACKEND: llamacpp
      INFERENCE_MOCK: "false"
      REQUIRE_REAL_INFERENCE: "true"
      LLAMACPP_URL: http://llama-cpp-server:5006/v1/completions
      SNAC_DEVICE: cuda
      ORPHEUS_GGUF_MODEL: ${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q8_0.gguf}
      ORPHEUS_GGUF_HF_REPO: ${ORPHEUS_GGUF_HF_REPO:-lex-au/Orpheus-3b-FT-Q8_0.gguf}
      ORPHEUS_MAX_TOKENS: ${ORPHEUS_MAX_TOKENS:-8192}
      ORPHEUS_TEMPERATURE: ${ORPHEUS_TEMPERATURE:-0.6}
      ORPHEUS_TOP_P: ${ORPHEUS_TOP_P:-0.9}
    volumes: []
    depends_on:
      llama-cpp-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      start_period: 600s

  llama-cpp-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    volumes:
      - gguf_models:/models
    depends_on:
      model-init:
        condition: service_completed_successfully
    command:
      - -m
      - /models/${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q8_0.gguf}
      - --host
      - "0.0.0.0"
      - --port
      - "5006"
      - -ngl
      - "99"
      - --ctx-size
      - "8192"
      - --parallel
      - "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:5006/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s

  model-init:
    image: python:3.11-slim
    volumes:
      - gguf_models:/models
    environment:
      ORPHEUS_GGUF_MODEL: ${ORPHEUS_GGUF_MODEL:-Orpheus-3b-FT-Q8_0.gguf}
      ORPHEUS_GGUF_HF_REPO: ${ORPHEUS_GGUF_HF_REPO:-lex-au/Orpheus-3b-FT-Q8_0.gguf}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        pip install -q --no-cache-dir huggingface_hub
        python <<'PY'
        import os
        import shutil
        from huggingface_hub import hf_hub_download
        model = os.environ["ORPHEUS_GGUF_MODEL"]
        repo = os.environ["ORPHEUS_GGUF_HF_REPO"]
        dest = f"/models/{model}"
        token = os.environ.get("HF_TOKEN") or os.environ.get("HUGGING_FACE_HUB_TOKEN")
        if os.path.isfile(dest) and os.path.getsize(dest) > 1_000_000:
            print("GGUF already present:", dest, os.path.getsize(dest))
        else:
            path = hf_hub_download(
                repo_id=repo,
                filename=model,
                token=token,
            )
            if os.path.abspath(path) != os.path.abspath(dest):
                shutil.copy2(path, dest)
            print("Downloaded:", dest, os.path.getsize(dest))
        PY

volumes:
  gguf_models:
